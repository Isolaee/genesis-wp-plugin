name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via cPanel Git
    runs-on: ubuntu-latest

    steps:
      - name: Trigger cPanel Git pull & deploy
        run: |
          curl -s --fail \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/update?repository_root=${{ secrets.CPANEL_REPO_ROOT }}"

      - name: Trigger cPanel deployment task
        run: |
          curl -s --fail \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControlDeployment/create?repository_root=${{ secrets.CPANEL_REPO_ROOT }}"
